SPQR_BOOKMARK_NAME: "The Ancient World"
SPQR_BOOKMARK_DESC: "Stable internal date: April 21st, 1936. Narratively this represents the founding of Rome and the opening of the ancient world, since the HOI4 engine does not safely support BC dates or true ancient chronology."
SPQ_BOOKMARK_DESC: "Romulus rules a young, aggressive Rome surrounded by Italian rivals. Unite Latium, subdue your neighbors, and decide whether the city on the Tiber will remain a local kingdom or become the first great power of the Mediterranean."
SBN_BOOKMARK_DESC: "The Sabines watch Rome's growth with suspicion from the rugged interior highlands. Resist Roman expansion, dominate the Apennines, and forge a kingdom strong enough to contest central Italy."
ETR_BOOKMARK_DESC: "The Etruscan League still holds wealthy, ancient, and proud cities north of the Tiber. Use your cultural and economic edge to contain Rome or restore Etruscan primacy across Italy."
SMN_BOOKMARK_DESC: "The Samnites command key strongholds and mountain passes in southern Italy. Fight from harsh terrain, unite the warrior tribes of the Apennines, and break the balance between Rome, Etruria, and the Greek cities."
SYC_BOOKMARK_DESC: "Syracuse dominates Sicily and watches the center of the Mediterranean between Italy and Africa. Turn the island into a commercial fortress or the base for expansion across Magna Graecia."
GRC_BOOKMARK_DESC: "The Hellenic poleis are divided by ancient rivalries, yet bound by language, culture, and common enemies. Impose hegemony over Greece and decide whether unity will come through diplomacy, trade, or conquest."
LAC_BOOKMARK_DESC: "Sparta preserves its severe military discipline in the Peloponnese while rivals grow richer and more ambitious. Trust in hoplite strength, restore Lacedaemonian supremacy, and crush those who challenge your order."
MCD_BOOKMARK_DESC: "Macedonia rises north of the Greek world, shaped by warrior kings and unstable frontiers. Strengthen the kingdom, dominate the Balkans, and prepare to intervene in the endless struggles of the Hellenic cities."
CRG_BOOKMARK_DESC: "Carthage protects a vast network of ports, colonies, and trade routes across North Africa. Enrich your mercantile republic, command the sea, and choose whether your future lies in Sicily, Iberia, or the whole western Mediterranean."
PHN_BOOKMARK_DESC: "Phoenician cities survive among larger kingdoms through trade, harbors, and diplomatic skill. Preserve the autonomy of Tyre and Sidon or rebuild a Phoenician thalassocracy worthy of its ancient sailors."
KMT_BOOKMARK_DESC: "Egypt commands the Nile valley, breadbasket of kings and bridge between Africa and Asia. Govern a fertile and coveted land, secure the delta, and project your influence into the Levant and the eastern Mediterranean."
ASS_BOOKMARK_DESC: "Assyria seeks once more to claim its place in fertile Mesopotamia, surrounded by rivals and strategic routes. Rebuild a fearsome military machine and restore Nineveh to the prestige of the great eastern empires."
IBR_BOOKMARK_DESC: "The Iberian peoples hold a peninsula rich in metals, coasts, and natural strongholds. Overcome tribal fragmentation, secure Mediterranean routes, and build a confederation able to resist Phoenicians, Carthaginians, and Gauls alike."
GLN_BOOKMARK_DESC: "Gallic tribes dominate the heart of Gaul, vast, fertile, and difficult to subdue. Rally the competing clans, exploit your manpower, and drive your borders toward Iberia, Italy, or the northern lands."
ILL_BOOKMARK_DESC: "Illyria commands the eastern Adriatic coast, where mountains and harbors favor both trade and war. Unite the coastal tribes, dominate the inner sea, and become the arbiter between Greece and Italy."
THR_BOOKMARK_DESC: "Thrace endures between Greek pressure and Anatolian ambition, rich in warriors, horses, and land routes. Use your frontier position to forge a hard, mobile, and feared kingdom in the eastern Balkans."
LYD_BOOKMARK_DESC: "Lydia guards western Anatolia and the routes linking Asia Minor to the Aegean. Draw on your wealth, control the commercial corridors, and decide whether you will remain a prosperous defensive kingdom or master the Anatolian coast."
