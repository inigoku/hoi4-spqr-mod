SPQR_BOOKMARK_NAME: "Mediterranean Before the Punic Wars"
SPQR_BOOKMARK_DESC: "Stable internal date: January 1st, 1936. Narratively this bookmark represents the Mediterranean around 264 BC, when Rome has unified peninsular Italy, Carthage dominates the western sea lanes, and the Hellenistic monarchies compete for the east."
SPQ_BOOKMARK_DESC: "The Roman Republic has just subdued peninsular Italy and now looks toward Sicily as the next arena of conflict. Consolidate your new conquests, manage your Italian allies, and decide whether Rome will cross the sea to challenge Carthage."

spq_rome_focus: "Roman Focus Tree"
SPQ_roman_focus_tree: "Roman Focus Tree"
SPQ_fundacion_de_roma: "Foundation of Rome"
SPQ_fundacion_de_roma_desc: "Legacy placeholder for the old Roman opening focus."
SPQ_legiones_de_roma: "Legions of Rome"
SPQ_legiones_de_roma_desc: "Legacy placeholder for the old Roman military focus."
SPQ_rapto_de_las_sabinas: "The Rape of the Sabines"
SPQ_rapto_de_las_sabinas_desc: "Legacy placeholder for the old Roman demographic focus."
SPQ_classis_romana: "Classis Romana"
SPQ_classis_romana_desc: "If Rome is to contest Sicily, it must become a naval power worthy of the Tyrrhenian and the straits."
SPQ_casus_belli_messana: "The Messana Casus Belli"
SPQ_casus_belli_messana_desc: "The Mamertines offer Rome an opening into Sicily. Intervention promises glory, but also war with Carthage."
SPQ_desembarco_en_sicilia: "Land in Sicily"
SPQ_desembarco_en_sicilia_desc: "The Sicilian war will be won by endurance, logistics, and the willingness to throw Roman armies across the water."
SPQ_bloqueo_de_lilibea: "Blockade Lilybaeum"
SPQ_bloqueo_de_lilibea_desc: "The Punic strongholds must be isolated if the Republic is to break Carthaginian resistance on the island."
SPQ_astilleros_de_ostia: "Dockyards of Ostia"
SPQ_astilleros_de_ostia_desc: "The Republic needs a stable naval program. We will expand coastal yards to sustain a permanent fleet."
SPQ_doctrina_del_corvus: "Corvus Doctrine"
SPQ_doctrina_del_corvus_desc: "Rome cannot match Punic seamanship by numbers alone. Boarding drills, discipline, and squadron coordination will be standardized."
SPQ_programa_de_quinquerremes: "Quinquereme Program"
SPQ_programa_de_quinquerremes_desc: "With doctrine and dockyards in place, the Republic can launch a major series of warships to dominate the Tyrrhenian and Sicily."
SPQ_financiacion_extraordinaria: "Extraordinary Financing"
SPQ_financiacion_extraordinaria_desc: "Victory will demand extraordinary taxes, loans, and political discipline from the Republic."
SPQ_paz_de_lutacio: "Peace of Lutatius"
SPQ_paz_de_lutacio_desc: "A Roman victory in Sicily would reorder the central Mediterranean and establish the Republic as a major naval force."
SPQ_reformas_postguerra: "Postwar Reforms"
SPQ_reformas_postguerra_desc: "The Punic struggle revealed the need for stronger institutions, steadier logistics, and more permanent military structures."
SPQ_mirada_hispania: "Turn Toward Hispania"
SPQ_mirada_hispania_desc: "The next strategic contest may be decided beyond Sicily, in the silver, manpower, and alliances of Iberia."
SPQ_preparar_choque_con_barcidas: "Prepare for the Barcid Clash"
SPQ_preparar_choque_con_barcidas_desc: "Carthage's recovery in Iberia points to a second, greater war. Rome must prepare before Hannibal does."
SBN_BOOKMARK_DESC: "Epirus commands the northwestern Greek coast and looks both to the Adriatic and to Macedonia. Gather your scattered lands, balance Macedonian pressure, and decide whether to follow the legacy of Pyrrhus or forge a new Epirote monarchy."
ETR_BOOKMARK_DESC: "Numidia commands the inland Maghreb between Carthage and the Atlantic approaches. Unite the cavalry clans, secure North African routes, and decide when to challenge Carthaginian predominance."
SMN_BOOKMARK_DESC: "The Samnites command key strongholds and mountain passes in southern Italy. Fight from harsh terrain, unite the warrior tribes of the Apennines, and break the balance between Rome, Etruria, and the Greek cities."
SYC_BOOKMARK_DESC: "Syracuse still holds a rich and strategic Sicily between Rome and Carthage, but now faces direct claims from both great powers. Fortify the island, exploit your fleet, and decide whether you will survive as an arbiter or impose your own rule over the central Mediterranean."
GRC_BOOKMARK_DESC: "The Achaean League seeks to rebuild a common Greek politics in the face of Macedon, Sparta, and the ambitions of the Hellenistic courts. Unite the southern cities, defend your autonomy, and lead a new Hellenic coalition."
LAC_BOOKMARK_DESC: "Sparta no longer dominates Greece, but its name still carries weight in the Peloponnese. Reorganize the kingdom, exploit the divisions of your neighbors, and try to recover lost Lacedaemonian influence."
MCD_BOOKMARK_DESC: "Antigonid Macedonia is once again the chief arbiter of the Greek world. Preserve your hegemony in the Balkans, contain the leagues of Greece, and watch both Thrace and the kingdoms of Asia."
CRG_BOOKMARK_DESC: "Carthage rules the western Mediterranean through Africa, Sardinia, and its old enclaves in southern Iberia. Maintain naval supremacy, protect your trade routes, and prepare for the inevitable collision with an expansionist Rome."
PHN_BOOKMARK_DESC: "Mauretania occupies the far western edge of North Africa, between mountains, coast, and shifting tribal alliances. Strengthen the kingdom, dominate the straits, and choose whether to cooperate with Carthage or contest its influence in the Maghreb."
KMT_BOOKMARK_DESC: "Ptolemaic Egypt is the richest monarchy in the eastern Mediterranean, master of the Nile and a decisive naval power. Protect Alexandria, hold Cyrenaica and Cyprus, manage the grain wealth of the valley, and contest the Levant with the Seleucids."
ASS_BOOKMARK_DESC: "The Seleucid Empire stretches from Syria and Mesopotamia deep into Asia, but its size is also its weakness. Hold the kingdom together, secure Syria, Aleppo, and the eastern Anatolian routes, and contain both Egypt and the powers of Anatolia."
IBR_BOOKMARK_DESC: "Native Iberia holds the interior, the eastern coast, and the northern reaches of the peninsula, while Carthage keeps strong southern enclaves. Overcome tribal fragmentation, command the coastal approaches, and decide whether to resist Punic expansion or exploit its wealth to unite the peninsula."
GLN_BOOKMARK_DESC: "Massalia survives as a Greek republic on the southern Gallic coast, a bridge between Hellenic trade and the Celtic interior. Protect your harbor, dominate the Gulf of Lion routes, and decide whether diplomacy, colonization, or war will secure your future."
ILL_BOOKMARK_DESC: "The Ardiaean Kingdom commands a fractured Adriatic coast rich in ports, raiding, and commerce. Strengthen your fleet, unite the Illyrians, and decide whether to challenge Greeks, Macedonians, or the Italians."
THR_BOOKMARK_DESC: "Thrace remains a turbulent frontier between Macedon, the Black Sea, and Anatolia, now with direct control of the Edirne straits corridor. Use your cavalry, warrior elites, and strategic position to survive among larger powers."
LYD_BOOKMARK_DESC: "Pergamon guards a coveted western Anatolia, hemmed in by Seleucids, Macedonians, and local rivals, with a southern outlet through Antalya. Turn your wealth into military power, resist the surrounding empires, and master the Aegean coast."

CRG_carthage_focus_tree: "Carthaginian Focus Tree"
KMT_egypt_focus_tree: "Ptolemaic Focus Tree"
