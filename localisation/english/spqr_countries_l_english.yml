CRG_sufetes_y_ancianos: "Suffetes and Elders"
CRG_sufetes_y_ancianos_desc: "Carthage's ruling elite must close ranks to sustain war and trade across the inland sea."
CRG_mercenarios_de_libia: "Recruit Libyan Mercenaries"
CRG_mercenarios_de_libia_desc: "Libya and Numidia can fill our ranks, if the treasury can pay."
CRG_dominar_rutas_occidentales: "Control Western Routes"
CRG_dominar_rutas_occidentales_desc: "Without naval routes, Carthage loses its decisive strategic advantage."
CRG_reforzar_sicilia: "Reinforce Sicily"
CRG_reforzar_sicilia_desc: "Sicilian garrisons must withstand Roman amphibious pressure."
CRG_responder_a_messana: "Answer in Messana"
CRG_responder_a_messana_desc: "Rome's move in Messana cannot go unanswered."
CRG_flotas_cuadrirremes: "Quadrireme Fleets"
CRG_flotas_cuadrirremes_desc: "Bigger fleets and tighter discipline will break enemy resistance at sea."
CRG_arsenales_del_cothon: "Cothon Arsenals"
CRG_arsenales_del_cothon_desc: "Carthage's military harbor must work at full pace to sustain the Sicilian war and protect western lanes."
CRG_tacticas_de_espolon: "Ramming Tactics"
CRG_tacticas_de_espolon_desc: "Maneuver and impact can decide naval battles before boarding even begins. Captains will drill hit-and-withdraw attacks."
CRG_familia_barca: "Rise of the Barcid Family"
CRG_familia_barca_desc: "A new military elite is ready to carry Carthaginian war beyond Sicily."
CRG_marcha_a_iberia: "March to Iberia"
CRG_marcha_a_iberia_desc: "Iberian silver, ports, and manpower can sustain our revenge."
CRG_juramento_de_hannibal: "Hannibal's Oath"
CRG_juramento_de_hannibal_desc: "A new generation swears not to yield to Rome."

KMT_trono_ptolemaico: "Secure the Ptolemaic Throne"
KMT_trono_ptolemaico_desc: "Dynastic legitimacy is essential to lead Egypt in a hostile strategic environment."
KMT_faros_de_alejandria: "Lighthouses of Alexandria"
KMT_faros_de_alejandria_desc: "Trade, knowledge, and maritime prestige sustain our greatness."
KMT_garantizar_el_grano_del_nilo: "Secure Nile Grain"
KMT_garantizar_el_grano_del_nilo_desc: "Harvest control determines internal stability and military funding."
KMT_liga_naval_egea: "Aegean Naval League"
KMT_liga_naval_egea_desc: "A web of ports and allies in the Aegean will protect our routes."
KMT_astilleros_del_delta: "Delta Dockyards"
KMT_astilleros_del_delta_desc: "The Nile Delta must become a naval construction center able to sustain permanent squadrons."
KMT_escuadra_de_chipre: "Cyprus Squadron"
KMT_escuadra_de_chipre_desc: "Securing Cyprus and its sea routes strengthens our leverage in the Levant against eastern and western rivals."
KMT_intervenir_en_celesiria: "Intervene in Coele-Syria"
KMT_intervenir_en_celesiria_desc: "The old struggle against the Seleucids is not over."
KMT_reforma_falangita: "Phalanx Reform"
KMT_reforma_falangita_desc: "Modernizing the phalanx and support arms will sustain longer campaigns."
KMT_equilibrio_entre_roma_y_cartago: "Balance Rome and Carthage"
KMT_equilibrio_entre_roma_y_cartago_desc: "Egypt must avoid strategic dependency on either western power."

MCD_legado_antigonida: "Antigonid Legacy"
MCD_legado_antigonida_desc: "Macedon can reclaim Hellenic leadership through political and military consolidation."
MCD_liga_corintia: "Revive the Corinthian League"
MCD_liga_corintia_desc: "The Greek poleis must cooperate again under a common direction."
MCD_reclutar_hetairoi: "Recruit Hetairoi"
MCD_reclutar_hetairoi_desc: "Macedonian cavalry must recover its prestige as a decisive arm."
MCD_astilleros_de_pella: "Dockyards of Pella"
MCD_astilleros_de_pella_desc: "Without a capable fleet, Macedon loses leverage in the Aegean."
MCD_hegemonia_naval_egea: "Aegean Naval Hegemony"
MCD_hegemonia_naval_egea_desc: "Antigonid influence over islands and straits demands a fleet that is present, fast, and disciplined."
MCD_talarassocracia_antigonida: "Antigonid Thalassocracy"
MCD_talarassocracia_antigonida_desc: "With reinforced ports and seasoned captains, Macedon can aspire to set the rules of the Aegean sea."
MCD_ambiciones_en_el_egeo: "Aegean Ambitions"
MCD_ambiciones_en_el_egeo_desc: "Islands and straits define regional influence and commerce."
MCD_arbitrar_conflicto_punico: "Arbitrate the Punic Conflict"
MCD_arbitrar_conflicto_punico_desc: "The Roman-Carthaginian struggle opens opportunities for an armed mediator."

SYC_tirania_de_hiero: "Rule of Hiero"
SYC_tirania_de_hiero_desc: "Hiero II seeks domestic stability between two giant powers at war."
SYC_fortificar_siracusa: "Fortify Syracuse"
SYC_fortificar_siracusa_desc: "Walls, arsenals, and garrisons will preserve our independence."
SYC_flota_siciliana: "Sicilian Fleet"
SYC_flota_siciliana_desc: "Control of nearby straits is vital for island autonomy."
SYC_astilleros_de_ortigia: "Ortygia Dockyards"
SYC_astilleros_de_ortigia_desc: "Syracuse's naval workshops must increase output to keep a fleet able to deter both Rome and Carthage."
SYC_liga_de_capitanes: "Captains' League"
SYC_liga_de_capitanes_desc: "A loyal network of experienced captains gives Syracuse tactical edge in the central sea."
SYC_equilibrio_entre_gigantes: "Balance Between Giants"
SYC_equilibrio_entre_gigantes_desc: "Rome and Carthage demand loyalty; Syracuse must negotiate to survive."
SYC_comercio_mediterraneo: "Mediterranean Trade"
SYC_comercio_mediterraneo_desc: "Prosperity depends on sea lanes and pragmatic commercial accords."

MIN_consolidar_tribus: "Consolidate Tribes and Councils"
MIN_consolidar_tribus_desc: "Before expansion, local cohesion and authority must be secured."
MIN_guardias_ciudadanas: "Citizen Guards"
MIN_guardias_ciudadanas_desc: "An organized militia core can blunt raids and buy diplomatic time."
MIN_reformas_fiscales: "Fiscal Reforms"
MIN_reformas_fiscales_desc: "Efficient taxation will sustain garrisons and defensive works."
MIN_pactos_portuarios: "Harbor Pacts"
MIN_pactos_portuarios_desc: "Even lesser kingdoms can endure by securing ports, maritime tolls, and supply agreements."
MIN_capitanes_mercantes: "Merchant Captains"
MIN_capitanes_mercantes_desc: "Training navigators and convoy escorts improves resilience against blockades and piracy."
MIN_diplomacia_de_supervivencia: "Diplomacy of Survival"
MIN_diplomacia_de_supervivencia_desc: "In a Mediterranean at war, small powers survive through flexibility."

spqr_punic.1.t: "The Messana Question"
spqr_punic.1.d: "The Mamertines of Messana ask for protection against Punic and Syracusan pressure. Intervention could ignite a major war."
spqr_punic.1.a: "We intervene in Sicily"
spqr_punic.1.b: "Not yet"
spqr_punic.2.t: "Rome Moves in Messana"
spqr_punic.2.d: "The Roman Republic has intervened in Messana. Our position in Sicily is now directly challenged."
spqr_punic.2.a: "Carthage will answer"
spqr_punic.3.t: "Defend Punic Hegemony"
spqr_punic.3.d: "We must hold our Sicilian positions and prevent Rome from controlling the strait."
spqr_punic.3.a: "Mobilize fleet and garrisons"
spqr_punic.4.t: "Carthage Reinforces Sicily"
spqr_punic.4.d: "Punic forces are concentrating on the island. A prolonged war looks inevitable."
spqr_punic.4.a: "We must endure"
spqr_punic.5.t: "Peace of Lutatius"
spqr_punic.5.d: "After years of attrition, Rome imposes terms and Sicily shifts the balance of the central Mediterranean."
spqr_punic.5.a: "The Republic emerges stronger"
spqr_punic.6.t: "Rumors of a New War"
spqr_punic.6.d: "Barcid expansion in Iberia and naval rivalry are fueling fears of a second total conflict."
spqr_punic.6.a: "Prepare the Republic"
spqr_punic.7.t: "The Barcid Oath"
spqr_punic.7.d: "Within Carthaginian military circles, determination for revenge against Rome is rising."
spqr_punic.7.a: "The struggle will continue"
spqr_punic.8.t: "Tension in Coele-Syria"
spqr_punic.8.d: "Egypt sees an opening in Syria while the western powers are consumed by Punic conflict."
spqr_punic.8.a: "Move our pieces"
spqr_punic.9.t: "Ptolemaic Diplomacy"
spqr_punic.9.d: "Alexandria debates whether to keep profitable neutrality or quietly choose a side."
spqr_punic.9.a: "Profitable neutrality"
spqr_punic.9.b: "Quiet preparation"
spqr_punic.10.t: "Macedon and the Western Balance"
spqr_punic.10.d: "The Antigonid court weighs mediation, arbitration, and opportunism in the Roman-Carthaginian struggle."
spqr_punic.10.a: "Arbitrators with spears"
spqr_punic.11.t: "The Syracusan Dilemma"
spqr_punic.11.d: "Syracuse cannot face both powers alone. Its choice must be cautious and timely."
spqr_punic.11.a: "Lean toward Rome"
spqr_punic.11.b: "Accommodate Carthage"
spqr_punic.12.t: "Survival of the Lesser Powers"
spqr_punic.12.d: "Between rival hegemons, smaller kingdoms survive through pragmatic politics and readiness."
spqr_punic.12.a: "We will endure"
