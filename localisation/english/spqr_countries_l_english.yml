SPQ_romulo_desc: "Marble voice of the Senate and sword of Rome: his rule promises order, conquest, and everlasting glory for the Republic."
ETR_leader_desc: "Crowned rider of Numidia's plains: where he marches, tribes unite and enemies fade into dust."
SMN_leader_desc: "Lord of Samnite strongholds: his name echoes through the valleys as a vow of ruthless endurance."
SYC_leader_desc: "Throne of Syracuse and beacon of Sicily: his will turns harbors into bastions and diplomacy into dominion."
GRC_leader_desc: "Tribune of western Hellas: he summons rival poleis toward one destiny with burning rhetoric and iron discipline."
LAC_leader_desc: "King of Sparta, guardian of the agoge: every order beats with the pulse of ancient Lacedaemonian pride."
MCD_leader_desc: "Basileus of Macedon and hammer of the Balkans: born to command courts, forged to decide wars."
CRG_leader_desc: "Suffete of Carthage and master of the Punic sea: his seal opens golden routes and his fleet closes them to rivals."
PHN_leader_desc: "Mauretanian lord of the ocean frontier: he binds clans, fortifies ports, and raises a kingdom from the edge."
KMT_leader_desc: "Pharaoh of Alexandria, lord of the Nile and libraries alike: his crown fuses wisdom, wealth, and imperial ambition."
SEL_leader_desc: "Seleucid great king, master of satrapies and caravan roads: his scepter holds a vast empire against the pull of fracture."
IBR_leader_desc: "Warlord of untamed Iberia: his prestige gathers scattered tribes into a single fighting will."
GLN_leader_desc: "Archon of Massalia: a merchant in peace, a fierce strategist whenever the coast demands steel."
ILL_leader_desc: "Illyrian king of the Adriatic: his ships arrive like storms, and his banner turns ports into oaths."
THR_leader_desc: "Odrysian monarch of hard-riding warriors: on the frontier of empires, his crown endures through daring and cold resolve."
LYD_leader_desc: "Dynast of Pergamon: he turns coin into walls, culture into authority, and ambition into rule."
