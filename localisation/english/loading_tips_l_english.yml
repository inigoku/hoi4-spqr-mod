l_english:
 LOADING_TIP_0: "Veni, vidi, vici.\n— Julius Caesar"
 LOADING_TIP_1: "Men willingly believe what they wish.\n— Julius Caesar"
 LOADING_TIP_2: "Experience is the teacher of all things.\n— Julius Caesar"
 LOADING_TIP_3: "In war, events of importance are the result of trivial causes.\n— Julius Caesar"
 LOADING_TIP_4: "No one is so brave that he is not disturbed by something unexpected.\n— Julius Caesar"
 LOADING_TIP_5: "What we achieve inwardly will change outer reality.\n— Julius Caesar, attributed"
 LOADING_TIP_6: "It is easier to find men who will volunteer to die than men willing to endure pain with patience.\n— Julius Caesar"
 LOADING_TIP_7: "Fortune, which has a great deal of power especially in war, can bring about great changes through very slight forces.\n— Julius Caesar"
 LOADING_TIP_8: "All bad precedents began as justifiable measures.\n— Julius Caesar"
 LOADING_TIP_9: "The die is cast.\n— Julius Caesar, at the crossing of the Rubicon"
 LOADING_TIP_10: "I had rather be first in a village than second at Rome.\n— Julius Caesar"
 LOADING_TIP_11: "We will either find a way, or make one.\n— Hannibal Barca, attributed"
 LOADING_TIP_12: "We shall cross the Alps. Or we shall not return.\n— Hannibal Barca, attributed"
 LOADING_TIP_13: "The Romans do not get beaten — they take a fall and at once spring up more dangerous than before.\n— Pyrrhus of Epirus, attributed"
 LOADING_TIP_14: "Another such victory and we are undone.\n— Pyrrhus of Epirus"
 LOADING_TIP_15: "Wars are not won by gold, but by iron.\n— Livy"
 LOADING_TIP_16: "There is no strength where there is no discipline.\n— Livy"
 LOADING_TIP_17: "Fortune is of great power in war, and cannot be measured.\n— Livy"
 LOADING_TIP_18: "In difficult and desperate cases, the boldest counsels are the safest.\n— Livy"
 LOADING_TIP_19: "The city was founded by valor; let valor guard and increase it.\n— Livy"
 LOADING_TIP_20: "Carthago delenda est. (Carthage must be destroyed.)\n— Cato the Elder"
 LOADING_TIP_21: "An army of stags led by a lion is more to be feared than an army of lions led by a stag.\n— Cato the Elder, attributed"
 LOADING_TIP_22: "The same man cannot be a general and a pleader at the same time.\n— Cato the Elder"
 LOADING_TIP_23: "Grasp the subject — the words will follow.\n— Cato the Elder"
 LOADING_TIP_24: "If you want peace, prepare for war.\n— Roman proverb (Si vis pacem, para bellum)"
 LOADING_TIP_25: "Fortune favors the bold.\n— Roman proverb (Audaces fortuna iuvat)"
 LOADING_TIP_26: "There is nothing impossible to him who will try.\n— Alexander the Great"
 LOADING_TIP_27: "I am not afraid of an army of lions led by a sheep; I am afraid of an army of sheep led by a lion.\n— Alexander the Great, attributed"
 LOADING_TIP_28: "Heaven cannot brook two suns, nor earth two masters.\n— Alexander the Great"
 LOADING_TIP_29: "Upon the conduct of each depends the fate of all.\n— Alexander the Great"
 LOADING_TIP_30: "Those who know how to win are much more numerous than those who know how to make proper use of their victories.\n— Polybius"
 LOADING_TIP_31: "Whenever a state has a good constitution, it is easier for its citizens to be virtuous.\n— Polybius"
 LOADING_TIP_32: "All states are the product not only of their circumstances, but of the character of their citizens.\n— Polybius"
 LOADING_TIP_33: "The Romans have excelled all others not so much in courage as in the superiority of their discipline and institutions.\n— Polybius"
 LOADING_TIP_34: "Without experience it is impossible for a general to be confident in his plans.\n— Polybius"
 LOADING_TIP_35: "The strong do what they can and the weak suffer what they must.\n— Thucydides"
 LOADING_TIP_36: "It is a common mistake in going to war to begin at the wrong end — to act first and discuss the matter after disaster.\n— Thucydides"
 LOADING_TIP_37: "The secret to happiness is freedom, and the secret to freedom is courage.\n— Thucydides, attributed"
 LOADING_TIP_38: "History is philosophy teaching by examples.\n— Thucydides, attributed"
 LOADING_TIP_39: "A nation that draws too broad a difference between its scholars and its warriors will have its thinking done by cowards and its fighting done by fools.\n— attributed"
 LOADING_TIP_40: "In peacetime, sons bury their fathers; in wartime, fathers bury their sons.\n— Herodotus"
 LOADING_TIP_41: "Great things are won by great dangers.\n— Herodotus"
 LOADING_TIP_42: "Of all men's miseries, the bitterest is this: to know so much and to have control over nothing.\n— Herodotus"
 LOADING_TIP_43: "Force has no place where there is need of skill.\n— Herodotus"
 LOADING_TIP_44: "Circumstances rule men; men do not rule circumstances.\n— Herodotus"
 LOADING_TIP_45: "In the midst of chaos, there is also opportunity.\n— Sun Tzu"
 LOADING_TIP_46: "The supreme art of war is to subdue the enemy without fighting.\n— Sun Tzu"
 LOADING_TIP_47: "He who knows when he can fight and when he cannot will be victorious.\n— Sun Tzu"
 LOADING_TIP_48: "All warfare is based on deception.\n— Sun Tzu"
 LOADING_TIP_49: "Appear weak when you are strong, and strong when you are weak.\n— Sun Tzu"
 LOADING_TIP_50: "Victorious warriors win first and then go to war; defeated warriors go to war first and then seek to win.\n— Sun Tzu"
 LOADING_TIP_51: "Speed is the essence of war. Take advantage of the enemy's unpreparedness.\n— Sun Tzu"
 LOADING_TIP_52: "Know your enemy and know yourself; in a hundred battles, you will never be defeated.\n— Sun Tzu"
 LOADING_TIP_53: "The greatest victory is that which requires no battle.\n— Sun Tzu"
 LOADING_TIP_54: "There is no instance of a nation benefiting from prolonged warfare.\n— Sun Tzu"
 LOADING_TIP_55: "The general who loses a battle makes but few calculations beforehand.\n— Sun Tzu"
 LOADING_TIP_56: "To secure ourselves against defeat lies in our own hands; the opportunity of defeating the enemy is provided by the enemy himself.\n— Sun Tzu"
 LOADING_TIP_57: "We are what we repeatedly do. Excellence, then, is not an act, but a habit.\n— Aristotle"
 LOADING_TIP_58: "The only stable state is the one in which all men are equal before the law.\n— Aristotle"
 LOADING_TIP_59: "It is not once nor twice but times without number that the same ideas make their appearance in the world.\n— Aristotle"
 LOADING_TIP_60: "Political society exists for the sake of noble actions, not of mere companionship.\n— Aristotle"
 LOADING_TIP_61: "A friend to all is a friend to none.\n— Aristotle"
 LOADING_TIP_62: "Hope is a waking dream.\n— Aristotle"
 LOADING_TIP_63: "The roots of education are bitter, but the fruit is sweet.\n— Aristotle"
 LOADING_TIP_64: "Knowing yourself is the beginning of all wisdom.\n— Aristotle"
 LOADING_TIP_65: "Only the dead have seen the end of war.\n— Plato, attributed"
 LOADING_TIP_66: "A good decision is based on knowledge and not on numbers.\n— Plato"
 LOADING_TIP_67: "The measure of a man is what he does with power.\n— Plato"
 LOADING_TIP_68: "Nothing in the affairs of men is worthy of great anxiety.\n— Plato"
 LOADING_TIP_69: "Give me a lever long enough and a fulcrum on which to place it, and I shall move the world.\n— Archimedes"
 LOADING_TIP_70: "Give me a place to stand on, and I will move the Earth.\n— Archimedes"
 LOADING_TIP_71: "There is small risk a general will be regarded with contempt by those he leads, if whatever he preaches, he shows himself best able to perform.\n— Xenophon"
 LOADING_TIP_72: "No man can be a good officer who does not undergo more than those he commands.\n— Xenophon"
 LOADING_TIP_73: "Excess of grief for the dead is madness; for it is an injury to the living, and the dead know it not.\n— Xenophon"
 LOADING_TIP_74: "I am never less idle than when I am idle, nor less alone than when I am alone.\n— Scipio Africanus"
 LOADING_TIP_75: "Ingratitude towards great men is something a state should never practise.\n— Scipio Africanus, attributed"
 LOADING_TIP_76: "Delay is the remedy for anger.\n— Fabius Maximus, attributed"
 LOADING_TIP_77: "Come back with your shield, or on it.\n— Spartan saying"
 LOADING_TIP_78: "Molon labe. (Come and take them.)\n— Leonidas of Sparta"
 LOADING_TIP_79: "The walls of Sparta are its young men — the strongest walls of all.\n— Lycurgus of Sparta, attributed"
 LOADING_TIP_80: "Nothing is so easy as self-deceit. For what each man wishes, that he also believes to be true.\n— Demosthenes"
 LOADING_TIP_81: "Small opportunities are often the beginning of great enterprises.\n— Demosthenes"
 LOADING_TIP_82: "The mind is not a vessel to be filled but a fire to be kindled.\n— Plutarch"
 LOADING_TIP_83: "To make no mistakes is not in the power of man; but from their errors and mistakes the wise and good learn wisdom.\n— Plutarch"
 LOADING_TIP_84: "He who fights and runs away lives to fight another day.\n— Menander, attributed"
 LOADING_TIP_85: "Man conquers the world by conquering himself.\n— Zeno of Citium"
 LOADING_TIP_86: "Call no man happy until he is dead.\n— Solon"
 LOADING_TIP_87: "Before beginning, plan carefully.\n— Cicero"
 LOADING_TIP_88: "The sinews of war are infinite money.\n— Cicero"
 LOADING_TIP_89: "Laws are silent in time of war.\n— Cicero (Inter arma enim silent leges)"
 LOADING_TIP_90: "To be ignorant of what occurred before you were born is to remain always a child.\n— Cicero"
 LOADING_TIP_91: "A donkey loaded with gold can capture any fortress.\n— Philip II of Macedon, attributed"
 LOADING_TIP_92: "Luck is what happens when preparation meets opportunity.\n— Seneca"
 LOADING_TIP_93: "We suffer more often in imagination than in reality.\n— Seneca"
 LOADING_TIP_94: "Divide and rule.\n— Roman political maxim"
 LOADING_TIP_95: "An army marches on its stomach.\n— Ancient military wisdom"
 LOADING_TIP_96: "The enemy of my enemy is my friend.\n— Ancient proverb"
 LOADING_TIP_97: "A ship in harbor is safe, but that is not what ships are for.\n— Ancient maritime wisdom"
 LOADING_TIP_98: "One who excels in employing forces will be able to employ both the talented and the untalented.\n— Sun Tzu"
 LOADING_TIP_99: "Senatus Populusque Romanus. The Senate and the People of Rome.\n— Roman tradition"
 LOADING_TIP_100: "Veni, vidi, vici.\n— Julius Caesar"
