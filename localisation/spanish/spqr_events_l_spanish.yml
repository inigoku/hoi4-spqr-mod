l_spanish:
 spq_events.1.t: "El éxito de los Juegos Consualia"
 spq_events.1.d: "Tal y como Rómulo había planeado, las tribus vecinas acudieron en masa a Roma para disfrutar de los juegos en honor a la deidad. A una señal preacordada, los romanos desenvainaron sus armas y tomaron a las mujeres jóvenes, obligando a los hombres sabinos a huir despavoridos.\n\nAunque esto asegura el futuro demográfico de nuestra ciudad, la indignación de nuestros vecinos es total. La guerra es ahora inevitable."
 spq_events.1.a: "Roma no pide perdón. ¡Que vengan!"
