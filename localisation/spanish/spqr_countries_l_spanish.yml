SPQ_romulo_desc: "Voz de mármol del Senado y espada de Roma: su mandato promete orden, conquistas y gloria eterna para la República."
SBN_tacio_desc: "Epiro lo aclama como heredero de los héroes: bajo su estandarte, las montañas jurarán fidelidad y la costa hablará con lanza y fuego."
ETR_leader_desc: "Jinete coronado del desierto númida: donde él cabalga, las tribus se unen y los enemigos se disuelven en polvo."
SMN_leader_desc: "Señor de fortalezas samnitas: su nombre resuena en los valles como promesa de resistencia implacable y victoria áspera."
SYC_leader_desc: "Trono de Siracusa y faro de Sicilia: su voluntad convierte puertos en bastiones y diplomacia en dominio."
GRC_leader_desc: "Tribuno de la Hélade occidental: convoca a las polis a un destino común, con palabra ardiente y disciplina de hierro."
LAC_leader_desc: "Rey de Esparta, guardián de la agoge: cada orden suya devuelve a Laconia el pulso de su vieja grandeza."
MCD_leader_desc: "Basileus de Macedonia y martillo de los Balcanes: nacido para mandar cortes, forjado para decidir guerras."
CRG_leader_desc: "Sufete de Cartago y dueño del mar púnico: su sello abre rutas de oro y su flota cierra el paso a los rivales."
PHN_leader_desc: "Señor mauritano de frontera oceánica: une clanes, fortalece puertos y levanta un reino donde antes solo había frontera."
KMT_leader_desc: "Faraón de Alejandría, señor del Nilo y de bibliotecas: su corona mezcla sabiduría, riqueza y ambición imperial."
ASS_leader_desc: "Gran rey seléucida, amo de satrapías y caravanas: su cetro sostiene un imperio vasto que se niega a fragmentarse."
IBR_leader_desc: "Caudillo de Iberia indómita: su prestigio convoca tribus dispersas para fundirlas en una sola voluntad guerrera."
GLN_leader_desc: "Arconte de Massalia: comerciante en tiempos de paz, estratega feroz cuando la costa exige acero."
ILL_leader_desc: "Rey ilirio del Adriático: sus naves aparecen como tormenta y su estandarte convierte puertos en juramentos."
THR_leader_desc: "Monarca odrisio de jinetes indómitos: en la frontera de imperios, su corona se sostiene con audacia y sangre fría."
LYD_leader_desc: "Dinasta de Pérgamo: convierte moneda en murallas, cultura en autoridad y ambición en poder real."
