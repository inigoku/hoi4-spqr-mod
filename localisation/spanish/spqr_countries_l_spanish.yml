SPQR_BOOKMARK_NAME: "El Mundo Antiguo"
SPQR_BOOKMARK_DESC: "Fecha interna estable: 21 de abril de 1936. Narrativamente representa la fundación de Roma y el arranque del mundo antiguo, ya que el motor de HOI4 no soporta fechas a.C. ni cronologías antiguas reales sin romper la carga."
SPQ_BOOKMARK_DESC: "Rómulo gobierna una Roma joven, agresiva y rodeada de rivales itálicos. Unifica el Lacio, somete a tus vecinos y decide si la ciudad del Tíber será un reino regional o el primer gran poder del Mediterráneo."
SBN_BOOKMARK_DESC: "Los sabinos observan con desconfianza el crecimiento de Roma desde las tierras montañosas del interior. Resiste la expansión romana, domina los Apeninos y forja un reino capaz de disputarle Italia central a sus vecinos."
ETR_BOOKMARK_DESC: "La Liga Etrusca conserva ciudades ricas, antiguas y orgullosas al norte del Tíber. Aprovecha tu ventaja cultural y económica para contener a Roma o restaurar la primacía etrusca sobre toda Italia."
SMN_BOOKMARK_DESC: "Los samnitas controlan fortalezas y pasos decisivos del sur itálico. Combate en terreno abrupto, une a las tribus guerreras de los Apeninos y rompe el equilibrio entre Roma, Etruria y las polis griegas."
SYC_BOOKMARK_DESC: "Siracusa domina Sicilia y vigila el corazón del Mediterráneo entre Italia y África. Usa tu posición naval para convertir la isla en una fortaleza comercial o en la base de una expansión sobre toda Magna Grecia."
GRC_BOOKMARK_DESC: "Las polis helénicas viven divididas por rivalidades antiguas, pero comparten lengua, cultura y enemigos comunes. Impón una hegemonía sobre Grecia y decide si el mundo helénico debe unirse por diplomacia, comercio o conquista."
LAC_BOOKMARK_DESC: "Esparta mantiene su severa disciplina militar en el Peloponeso mientras sus rivales se enriquecen y conspiran. Confía en la fuerza hoplita, restaura la supremacía lacedemonia y somete a quienes desafíen tu orden."
MCD_BOOKMARK_DESC: "Macedonia se alza al norte del mundo griego, entre reyes guerreros y fronteras inestables. Moderniza el reino, domina los Balcanes y prepárate para intervenir en las eternas disputas de las polis helénicas."
CRG_BOOKMARK_DESC: "Cartago protege una vasta red de puertos, colonias y rutas comerciales en el norte de África. Enriquece tu república mercantil, controla el mar y decide si tu destino está en Sicilia, Iberia o todo el Mediterráneo occidental."
PHN_BOOKMARK_DESC: "Las ciudades fenicias sobreviven entre grandes reinos gracias a su comercio, sus puertos y su habilidad diplomática. Mantén la autonomía de Tiro y Sidón o reconstruye una talasocracia fenicia digna de sus antiguos navegantes."
KMT_BOOKMARK_DESC: "Egipto domina el valle del Nilo, granero de reyes y puente entre África y Asia. Administra una tierra fértil y codiciada, asegura el delta y proyecta tu influencia hacia el Levante y el Mediterráneo oriental."
ASS_BOOKMARK_DESC: "Asiria vuelve a reclamar su lugar en la fértil Mesopotamia, rodeada de potencias rivales y rutas estratégicas. Reconstruye una maquinaria militar temible y devuelve a Nínive el prestigio de los grandes imperios del este."
IBR_BOOKMARK_DESC: "Los pueblos íberos ocupan una península rica en metales, costas y fortalezas naturales. Supera la fragmentación tribal, asegura las rutas mediterráneas y crea una confederación capaz de resistir a fenicios, cartagineses y galos."
GLN_BOOKMARK_DESC: "Las tribus galas dominan el corazón de la Galia, vasto, fértil y difícil de someter. Reúne clanes enfrentados, explota tu fuerza numérica y empuja tus fronteras hacia Iberia, Italia o las tierras del norte."
ILL_BOOKMARK_DESC: "Iliria controla la costa oriental del Adriático, donde montañas y puertos favorecen tanto el comercio como la guerra. Une a las tribus costeras, domina el mar interior y conviértete en árbitro entre Grecia e Italia."
THR_BOOKMARK_DESC: "Tracia resiste entre el empuje griego y las ambiciones de Anatolia, rica en guerreros, caballos y rutas terrestres. Aprovecha tu posición fronteriza para crear un reino duro, móvil y temido en los Balcanes orientales."
LYD_BOOKMARK_DESC: "Lidia guarda Anatolia occidental y las rutas que conectan Asia Menor con el Egeo. Apóyate en tu riqueza, controla los pasos comerciales y decide si serás un reino próspero a la defensiva o el dueño de toda la costa anatolia."
