SPQR_BOOKMARK_NAME: "El Mediterráneo antes de las Guerras Púnicas"
SPQR_BOOKMARK_DESC: "Fecha interna estable: 1 de enero de 1936. Narrativamente representa el Mediterráneo hacia 264 a.C., cuando Roma ya domina Italia, Cartago controla el occidente marítimo y las monarquías helenísticas compiten por el este."
SPQ_BOOKMARK_DESC: "La República Romana acaba de someter a la Italia peninsular y mira a Sicilia como su próximo campo de disputa. Consolida tus nuevas conquistas, organiza a tus aliados itálicos y decide si Roma cruzará el mar para desafiar a Cartago."
SBN_BOOKMARK_DESC: "Epiro domina la costa noroccidental griega y mira tanto al Adriático como a Macedonia. Reúne tus territorios dispersos, equilibra la presión macedonia y decide si seguirás el legado de Pirro o forjarás una nueva monarquía epirota."
ETR_BOOKMARK_DESC: "Numidia controla el interior del Magreb entre Cartago y el Atlántico. Une a los clanes de caballería, asegúrate las rutas del norte de África y decide cuándo desafiar el predominio cartaginés."
SMN_BOOKMARK_DESC: "Los samnitas controlan fortalezas y pasos decisivos del sur itálico. Combate en terreno abrupto, une a las tribus guerreras de los Apeninos y rompe el equilibrio entre Roma, Etruria y las polis griegas."
SYC_BOOKMARK_DESC: "Siracusa conserva una Sicilia rica y estratégica entre Roma y Cartago, pero ahora vive bajo reclamaciones directas de ambos gigantes. Fortifica la isla, explota tu flota y decide si sobrevivirás como árbitro del conflicto o si impondrás tu propia hegemonía en el centro del Mediterráneo."
GRC_BOOKMARK_DESC: "La Liga Aquea intenta articular una respuesta griega frente a Macedonia, Esparta y las ambiciones de las cortes helenísticas. Une las ciudades del sur, protege tu autonomía y reconstruye una política común para la Hélade."
LAC_BOOKMARK_DESC: "Esparta ya no domina Grecia, pero sigue siendo un nombre temido en el Peloponeso. Reorganiza tu reino, aprovecha las divisiones de tus vecinos y busca recuperar el peso que tuvieron los lacedemonios."
MCD_BOOKMARK_DESC: "La Macedonia antigónida vuelve a ser el gran árbitro del mundo griego. Sostén tu hegemonía en los Balcanes, contiene las ligas helenas y vigila tanto a Tracia como a los reinos de Asia."
CRG_BOOKMARK_DESC: "Cartago gobierna el comercio del Mediterráneo occidental desde África, Cerdeña y sus viejos enclaves del sur de Iberia. Mantén la primacía naval, protege tus rutas y prepárate para el choque inevitable con una Roma en plena expansión."
PHN_BOOKMARK_DESC: "Mauritania ocupa el extremo occidental del norte de África, entre montañas, costa y alianzas tribales cambiantes. Fortalece el reino, domina el estrecho y elige si cooperarás con Cartago o disputarás su influencia en el Magreb."
KMT_BOOKMARK_DESC: "El Egipto ptolemaico es la monarquía más rica del Mediterráneo oriental, dueño del Nilo y actor decisivo en el mar. Protege Alejandría, controla Cirenaica y Chipre, administra el grano del valle y disputa el Levante a los seléucidas."
ASS_BOOKMARK_DESC: "El Imperio Seléucida se extiende desde Siria y Mesopotamia hasta el corazón de Asia, pero su tamaño es también su debilidad. Mantén unido el reino, asegúrate Siria, Alepo y las rutas anatolias orientales, y frena a Egipto y a los poderes anatolios."
IBR_BOOKMARK_DESC: "La Iberia indígena domina el interior, el Levante y el norte peninsular, mientras Cartago conserva enclaves fuertes en el sur. Supera la fragmentación tribal, controla los pasos costeros y decide si resistirás a los púnicos o aprovecharás su riqueza para unificar la península."
GLN_BOOKMARK_DESC: "Massalia sobrevive como república griega en la costa del sur de la Galia, puente entre el comercio helénico y los pueblos celtas del interior. Protege tu puerto, domina las rutas del golfo de León y decide si prosperarás por diplomacia, colonización o guerra." 
ILL_BOOKMARK_DESC: "El reino ardieo domina una costa adriática fragmentada, rica en puertos, incursiones y comercio. Refuerza tu flota, unifica a los ilirios y decide si desafiarás a griegos, macedonios o italianos."
THR_BOOKMARK_DESC: "Tracia sigue siendo una frontera turbulenta entre Macedonia, el mar Negro y Anatolia, ahora con control directo del estrecho de Edirne. Usa tu caballería, tus jefes guerreros y tu posición estratégica para sobrevivir entre potencias mayores."
LYD_BOOKMARK_DESC: "Pérgamo custodia una Anatolia occidental codiciada por seléucidas, macedonios y reinos locales, con salida al sur por Antalya. Convierte tu riqueza en ejército, resiste a los imperios vecinos y adueñate de la costa egea."
