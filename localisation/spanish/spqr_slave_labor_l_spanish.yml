l_spanish:
 spqr_slave_labor_1: "Mano de Obra Cautiva I"
 spqr_slave_labor_1_desc: "Las victorias recientes han permitido emplear esclavos en tareas basicas de extraccion y manufactura."
 spqr_slave_labor_2: "Mano de Obra Cautiva II"
 spqr_slave_labor_2_desc: "La administracion estatal organiza mejor el trabajo forzado y aumenta el ritmo de los talleres."
 spqr_slave_labor_3: "Mano de Obra Cautiva III"
 spqr_slave_labor_3_desc: "Con nuevas campanas victoriosas, la economia integra contingentes mayores de esclavos y mejora la produccion."
 spqr_slave_labor_4: "Mano de Obra Cautiva IV"
 spqr_slave_labor_4_desc: "El aparato logistico de guerra convierte cautivos en recurso estrategico para sostener arsenales y astilleros."
 spqr_slave_labor_5: "Mano de Obra Cautiva V"
 spqr_slave_labor_5_desc: "La expansion continua ha llevado el sistema de trabajo cautivo a su maximo rendimiento industrial."
