l_spanish:
 SPQ_fundacion_de_roma: "La Fundación de Roma"
 SPQ_fundacion_de_roma_desc: "Con las murallas del Palatino recién alzadas y la sangre de Remo aún fresca en la tierra, Rómulo se corona como el primer Rey. Nuestro destino es gobernar Italia, pero primero debemos consolidar la ciudad."
 SPQ_legiones_de_roma: "Las Legiones de Roma"
 SPQ_legiones_de_roma_desc: "Para defender nuestras nuevas murallas, debemos organizar a los ciudadanos en una fuerza de combate disciplinada. Todo hombre capaz portará una lanza por Rómulo."
 SPQ_rapto_de_las_sabinas: "El Rapto de las Sabinas"
 SPQ_rapto_de_las_sabinas_desc: "Nuestra ciudad es fuerte, pero carecemos de mujeres para asegurar las futuras generaciones. Organizaremos unos grandes juegos en honor a Neptuno, invitaremos a la tribu de los Sabinos... y tomaremos lo que necesitamos para que Roma sobreviva."
