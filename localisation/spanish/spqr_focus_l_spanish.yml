l_spanish:
 SPQ_roman_focus_tree: "Arbol Romano"
 SPQ_fundacion_de_roma: "Senatus Populusque Romanus"
 SPQ_fundacion_de_roma_desc: "El Senado debe guiar a la Republica en esta era de expansion. Un mando politico firme sostendra el esfuerzo de guerra que se avecina."
 SPQ_legiones_de_roma: "Reforma Manipular"
 SPQ_legiones_de_roma_desc: "La flexibilidad tactica de los maniplos permitira a Roma imponerse frente a enemigos diversos en Italia y Sicilia."
 SPQ_rapto_de_las_sabinas: "Movilizar a los Socii"
 SPQ_rapto_de_las_sabinas_desc: "Los aliados italicos son la columna de reserva de la Republica. Integraremos su aporte humano al esfuerzo comun."

 SPQ_senatus_populusque: "Senatus Populusque Romanus"
 SPQ_senatus_populusque_desc: "El Senado debe guiar a la Republica en esta era de expansion. Un mando politico firme sostendra el esfuerzo de guerra que se avecina."
 SPQ_reforma_manipular: "Reforma Manipular"
 SPQ_reforma_manipular_desc: "La flexibilidad tactica de los maniplos permitira a Roma imponerse frente a enemigos diversos en Italia y Sicilia."
 SPQ_socii_italici: "Movilizar a los Socii"
 SPQ_socii_italici_desc: "Los aliados italicos son la columna de reserva de la Republica. Integraremos su aporte humano al esfuerzo comun."
 SPQ_classis_romana: "Classis Romana"
 SPQ_classis_romana_desc: "Si Roma quiere imponerse en Sicilia, debe dominar tambien el mar. Es hora de una marina digna de nuestra ambicion."
 SPQ_casus_belli_messana: "Casus Belli en Mesana"
 SPQ_casus_belli_messana_desc: "La crisis de Mesana puede abrir la puerta de Sicilia. Intervenir implicara chocar directamente con Cartago."
 SPQ_desembarco_en_sicilia: "Desembarco en Sicilia"
 SPQ_desembarco_en_sicilia_desc: "Nuestras legiones cruzaran el estrecho y combatiran por cada ciudad de la isla."
 SPQ_bloqueo_de_lilibea: "Bloqueo de Lilibea"
 SPQ_bloqueo_de_lilibea_desc: "Neutralizar los puertos púnicos debilitara su capacidad de sostener la guerra en Sicilia."
 SPQ_astilleros_de_ostia: "Astilleros de Ostia"
 SPQ_astilleros_de_ostia_desc: "La Republica necesita un programa naval estable. Ampliaremos astilleros en la costa para sostener una flota permanente."
 SPQ_doctrina_del_corvus: "Doctrina del Corvus"
 SPQ_doctrina_del_corvus_desc: "Roma no puede igualar la tradicion marinera púnica solo con numero. Estandarizaremos abordajes, disciplina y coordinacion de escuadras."
 SPQ_programa_de_quinquerremes: "Programa de Quinquerremes"
 SPQ_programa_de_quinquerremes_desc: "Con nueva doctrina y astilleros en marcha, la Republica puede lanzar una gran serie de naves de guerra para dominar el Tirreno y Sicilia."
 SPQ_financiacion_extraordinaria: "Financiacion Extraordinaria"
 SPQ_financiacion_extraordinaria_desc: "La guerra exige tributos, prestamos y sacrificios. Roma pagara el precio de la victoria."
 SPQ_paz_de_lutacio: "Paz de Lutacio"
 SPQ_paz_de_lutacio_desc: "Con Sicilia en nuestras manos, podemos imponer una paz favorable y redefinir el equilibrio mediterraneo."
 SPQ_reformas_postguerra: "Reformas de Postguerra"
 SPQ_reformas_postguerra_desc: "Tras la campaña siciliana, necesitamos consolidar administracion, ejercito y cohesion interna."
 SPQ_mirada_hispania: "Mirada a Hispania"
 SPQ_mirada_hispania_desc: "La riqueza de Hispania atrae a Roma y Cartago por igual. La proxima crisis se gestara en Occidente."
 SPQ_preparar_choque_con_barcidas: "Preparar el Choque con los Barcidas"
 SPQ_preparar_choque_con_barcidas_desc: "La casa Barca crece en poder. Roma debe prepararse para un conflicto mayor."

 CRG_sufetes_y_ancianos: "Sufetes y Consejo de Ancianos"
 CRG_sufetes_y_ancianos_desc: "La oligarquia cartaginesa debe cerrar filas para sostener la guerra y el comercio en todo el mar interior."
 CRG_mercenarios_de_libia: "Reclutar Mercenarios Libios"
 CRG_mercenarios_de_libia_desc: "Libia y Numidia pueden llenar nuestras filas con soldados experimentados, si el tesoro responde."
 CRG_dominar_rutas_occidentales: "Dominar Rutas Occidentales"
 CRG_dominar_rutas_occidentales_desc: "Sin control de las rutas navales, Cartago pierde su principal ventaja estrategica."
 CRG_reforzar_sicilia: "Reforzar Sicilia"
 CRG_reforzar_sicilia_desc: "Las guarniciones de Sicilia deben resistir cualquier intento romano de desembarco."
 CRG_responder_a_messana: "Responder a Mesana"
 CRG_responder_a_messana_desc: "La intervencion romana en Mesana no puede quedar sin respuesta."
 CRG_flotas_cuadrirremes: "Flotas de Cuadrirremes"
 CRG_flotas_cuadrirremes_desc: "Incrementaremos el tonelaje y la disciplina naval para quebrar la resistencia enemiga."
 CRG_arsenales_del_cothon: "Arsenales del Cothon"
 CRG_arsenales_del_cothon_desc: "El puerto militar cartagines debe trabajar sin descanso para sostener la guerra en Sicilia y proteger las rutas occidentales."
 CRG_tacticas_de_espolon: "Tacticas de Espolon"
 CRG_tacticas_de_espolon_desc: "La maniobra y el espolon pueden decidir batallas navales antes del abordaje. Entrenaremos capitanes para golpear y retirarse con precision."
 CRG_familia_barca: "Ascenso de la Familia Barca"
 CRG_familia_barca_desc: "Una nueva elite militar esta dispuesta a llevar la guerra cartaginesa mas alla de Sicilia."
 CRG_marcha_a_iberia: "Marcha a Iberia"
 CRG_marcha_a_iberia_desc: "La plata, los reclutas y los puertos hispanos pueden sostener nuestra revancha."
 CRG_juramento_de_hannibal: "El Juramento de Hannibal"
 CRG_juramento_de_hannibal_desc: "La nueva generacion barcida jura no ceder ante Roma."

 KMT_trono_ptolemaico: "Afirmar el Trono Ptolemaico"
 KMT_trono_ptolemaico_desc: "La dinastia debe reforzar su legitimidad para dirigir Egipto en un entorno geoestrategico hostil."
 KMT_faros_de_alejandria: "Los Faros de Alejandria"
 KMT_faros_de_alejandria_desc: "Comercio, conocimiento y prestigio maritimo sostienen nuestra grandeza."
 KMT_garantizar_el_grano_del_nilo: "Garantizar el Grano del Nilo"
 KMT_garantizar_el_grano_del_nilo_desc: "El control de las cosechas decide la estabilidad interna y la capacidad de financiacion militar."
 KMT_liga_naval_egea: "Liga Naval Egea"
 KMT_liga_naval_egea_desc: "Una red de aliados y puertos en el Egeo protegera nuestras rutas."
 KMT_astilleros_del_delta: "Astilleros del Delta"
 KMT_astilleros_del_delta_desc: "La desembocadura del Nilo debe convertirse en un centro de construccion naval capaz de abastecer nuestras escuadras."
 KMT_escuadra_de_chipre: "Escuadra de Chipre"
 KMT_escuadra_de_chipre_desc: "Controlar Chipre y sus rutas maritimas fortalece nuestra posicion en el Levante frente a rivales asiaticos y mediterraneos."
 KMT_intervenir_en_celesiria: "Intervenir en Celesiria"
 KMT_intervenir_en_celesiria_desc: "El viejo pulso con los seleucidas sigue abierto: Siria vuelve a ser el tablero decisivo."
 KMT_reforma_falangita: "Reforma Falangita"
 KMT_reforma_falangita_desc: "Modernizar la falange y su apoyo permitira sostener campañas mas largas."
 KMT_equilibrio_entre_roma_y_cartago: "Equilibrio entre Roma y Cartago"
 KMT_equilibrio_entre_roma_y_cartago_desc: "No debemos quedar atrapados por una sola potencia occidental."

 MCD_legado_antigonida: "Legado Antigonida"
 MCD_legado_antigonida_desc: "Macedonia puede reclamar el liderazgo helenico si consolida su poder politico y militar."
 MCD_liga_corintia: "Revitalizar la Liga Corintia"
 MCD_liga_corintia_desc: "Las poleis griegas deben volver a cooperar bajo una direccion comun."
 MCD_reclutar_hetairoi: "Reclutar Hetairoi"
 MCD_reclutar_hetairoi_desc: "La caballeria macedonia debe recuperar su prestigio como fuerza de decision."
 MCD_astilleros_de_pella: "Astilleros de Pella"
 MCD_astilleros_de_pella_desc: "Sin una marina funcional, Macedonia pierde margen de maniobra en el Egeo."
 MCD_hegemonia_naval_egea: "Hegemonia Naval Egea"
 MCD_hegemonia_naval_egea_desc: "La influencia antigonida sobre islas y estrechos depende de una flota presente, rapida y disciplinada."
 MCD_talarassocracia_antigonida: "Talasocracia Antigonida"
 MCD_talarassocracia_antigonida_desc: "Con puertos reforzados y capitanes curtidos, Macedonia puede aspirar a dictar las reglas del mar Egeo."
 MCD_ambiciones_en_el_egeo: "Ambiciones en el Egeo"
 MCD_ambiciones_en_el_egeo_desc: "Islas y estrechos definen el comercio y la influencia regional."
 MCD_arbitrar_conflicto_punico: "Arbitrar el Conflicto Punico"
 MCD_arbitrar_conflicto_punico_desc: "La guerra entre Roma y Cartago abre oportunidades para un mediador armado."

 SYC_tirania_de_hiero: "Tirania de Hiero"
 SYC_tirania_de_hiero_desc: "Hiero II busca estabilidad interna para sobrevivir entre dos gigantes en guerra."
 SYC_fortificar_siracusa: "Fortificar Siracusa"
 SYC_fortificar_siracusa_desc: "Murallas, arsenales y guarniciones sostendran nuestra independencia."
 SYC_flota_siciliana: "Flota Siciliana"
 SYC_flota_siciliana_desc: "Controlar los estrechos cercanos es vital para preservar la autonomia de la isla."
 SYC_astilleros_de_ortigia: "Astilleros de Ortigia"
 SYC_astilleros_de_ortigia_desc: "Los talleres navales de Siracusa deben aumentar su ritmo para mantener una armada capaz de disuadir a Roma y Cartago."
 SYC_liga_de_capitanes: "Liga de Capitanes"
 SYC_liga_de_capitanes_desc: "Una red de capitanes leales y experimentados dara a Siracusa una ventaja tactica en el mar central."
 SYC_equilibrio_entre_gigantes: "Equilibrio entre Gigantes"
 SYC_equilibrio_entre_gigantes_desc: "Roma y Cartago exigen lealtades. Siracusa debe negociar sin ser absorbida."
 SYC_comercio_mediterraneo: "Comercio Mediterraneo"
 SYC_comercio_mediterraneo_desc: "Nuestra prosperidad depende del mar y de pactos comerciales pragmaticos."

 MIN_consolidar_tribus: "Consolidar Tribus y Consejos"
 MIN_consolidar_tribus_desc: "Antes de pensar en expansion, debemos asegurar cohesion interna y autoridad local."
 MIN_guardias_ciudadanas: "Guardias Ciudadanas"
 MIN_guardias_ciudadanas_desc: "Un nucleo de milicia organizada puede frenar incursiones y ganar tiempo diplomatico."
 MIN_reformas_fiscales: "Reformas Fiscales"
 MIN_reformas_fiscales_desc: "Recaudar de forma eficiente permitira sostener guarniciones y obras defensivas."
 MIN_pactos_portuarios: "Pactos Portuarios"
 MIN_pactos_portuarios_desc: "Incluso los reinos menores pueden sobrevivir si aseguran puertos, tasas comerciales y acuerdos de abastecimiento maritimo."
 MIN_capitanes_mercantes: "Capitanes Mercantes"
 MIN_capitanes_mercantes_desc: "Formar navegantes y escoltas comerciales mejora nuestra resiliencia frente a bloqueos y pirateria."
 MIN_diplomacia_de_supervivencia: "Diplomacia de Supervivencia"
 MIN_diplomacia_de_supervivencia_desc: "En un Mediterraneo en guerra, sobrevivir exige alianzas flexibles."
