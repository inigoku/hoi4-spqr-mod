l_spanish:
 LOADING_TIP_0: "Veni, vidi, vici. (Llegué, vi, vencí.)\n— Julio César"
 LOADING_TIP_1: "Los hombres creen voluntariamente aquello que desean.\n— Julio César"
 LOADING_TIP_2: "La experiencia es la maestra de todas las cosas.\n— Julio César"
 LOADING_TIP_3: "En la guerra, los grandes eventos son el resultado de causas triviales.\n— Julio César"
 LOADING_TIP_4: "Nadie es tan valiente que no se turbe ante algo inesperado.\n— Julio César"
 LOADING_TIP_5: "Lo que logramos en nuestro interior cambia la realidad exterior.\n— Julio César, atribuido"
 LOADING_TIP_6: "Es más fácil encontrar hombres dispuestos a morir que hombres dispuestos a soportar el dolor con paciencia.\n— Julio César"
 LOADING_TIP_7: "La fortuna, que tiene gran poder en todos los asuntos y especialmente en la guerra, puede producir grandes cambios a partir de causas mínimas.\n— Julio César"
 LOADING_TIP_8: "Todos los malos precedentes comenzaron como medidas justificables.\n— Julio César"
 LOADING_TIP_9: "La suerte está echada.\n— Julio César, al cruzar el Rubicón"
 LOADING_TIP_10: "Prefiero ser el primero en una aldea que el segundo en Roma.\n— Julio César"
 LOADING_TIP_11: "Encontraremos un camino, o lo abriremos nosotros mismos.\n— Aníbal Barca, atribuido"
 LOADING_TIP_12: "Cruzaremos los Alpes. O no regresaremos.\n— Aníbal Barca, atribuido"
 LOADING_TIP_13: "Los romanos no son derrotados: caen y vuelven a levantarse más peligrosos que antes.\n— Pirro de Epiro, atribuido"
 LOADING_TIP_14: "Otra victoria así y estamos perdidos.\n— Pirro de Epiro"
 LOADING_TIP_15: "Las guerras no se ganan con oro, sino con hierro.\n— Tito Livio"
 LOADING_TIP_16: "No hay fortaleza donde no hay disciplina.\n— Tito Livio"
 LOADING_TIP_17: "La fortuna tiene gran poder en la guerra, y no puede medirse.\n— Tito Livio"
 LOADING_TIP_18: "En los casos difíciles y desesperados, los consejos más audaces son los más seguros.\n— Tito Livio"
 LOADING_TIP_19: "La ciudad fue fundada por el valor; que el valor la guarde y la acreciente.\n— Tito Livio"
 LOADING_TIP_20: "Carthago delenda est. (Cartago debe ser destruida.)\n— Catón el Viejo"
 LOADING_TIP_21: "Un ejército de ciervos conducido por un león es más temible que un ejército de leones conducido por un ciervo.\n— Catón el Viejo, atribuido"
 LOADING_TIP_22: "El mismo hombre no puede ser general y abogado al mismo tiempo.\n— Catón el Viejo"
 LOADING_TIP_23: "Domina el asunto y las palabras vendrán solas.\n— Catón el Viejo"
 LOADING_TIP_24: "Si quieres la paz, prepárate para la guerra.\n— Proverbio romano (Si vis pacem, para bellum)"
 LOADING_TIP_25: "La fortuna favorece a los audaces.\n— Proverbio romano (Audaces fortuna iuvat)"
 LOADING_TIP_26: "No hay nada imposible para quien lo intenta.\n— Alejandro Magno"
 LOADING_TIP_27: "No temo a un ejército de leones comandado por una oveja; temo a un ejército de ovejas comandado por un león.\n— Alejandro Magno, atribuido"
 LOADING_TIP_28: "El cielo no puede tener dos soles, ni la tierra dos amos.\n— Alejandro Magno"
 LOADING_TIP_29: "De la conducta de cada uno depende el destino de todos.\n— Alejandro Magno"
 LOADING_TIP_30: "Quienes saben cómo ganar son mucho más numerosos que quienes saben hacer buen uso de sus victorias.\n— Polibio"
 LOADING_TIP_31: "Cuando un estado tiene buena constitución, es más fácil que sus ciudadanos sean virtuosos.\n— Polibio"
 LOADING_TIP_32: "Los estados son el producto no solo de sus circunstancias, sino del carácter de sus ciudadanos.\n— Polibio"
 LOADING_TIP_33: "Los romanos han superado a todos los demás no tanto en valentía como en la superioridad de su disciplina e instituciones.\n— Polibio"
 LOADING_TIP_34: "Sin experiencia, es imposible que un general tenga confianza en sus planes.\n— Polibio"
 LOADING_TIP_35: "Los fuertes hacen lo que pueden y los débiles sufren lo que deben.\n— Tucídides"
 LOADING_TIP_36: "Es un error común comenzar una guerra por el extremo equivocado: actuar primero y discutir el asunto después del desastre.\n— Tucídides"
 LOADING_TIP_37: "El secreto de la felicidad es la libertad, y el secreto de la libertad es el coraje.\n— Tucídides, atribuido"
 LOADING_TIP_38: "La historia es la filosofía que enseña con ejemplos.\n— Tucídides, atribuido"
 LOADING_TIP_39: "Una nación que establece una diferencia demasiado amplia entre sus eruditos y sus guerreros tendrá sus leyes escritas por cobardes y sus guerras libradas por necios.\n— atribuido"
 LOADING_TIP_40: "En tiempos de paz, los hijos entierran a sus padres; en tiempos de guerra, los padres entierran a sus hijos.\n— Heródoto"
 LOADING_TIP_41: "Las grandes hazañas se consiguen con grandes riesgos.\n— Heródoto"
 LOADING_TIP_42: "De todas las miserias del hombre, la más amarga es esta: saber tanto y no tener poder sobre nada.\n— Heródoto"
 LOADING_TIP_43: "La fuerza no tiene cabida donde se necesita habilidad.\n— Heródoto"
 LOADING_TIP_44: "Las circunstancias gobiernan a los hombres; los hombres no gobiernan las circunstancias.\n— Heródoto"
 LOADING_TIP_45: "En medio del caos, también hay oportunidad.\n— Sun Tzu"
 LOADING_TIP_46: "El arte supremo de la guerra es someter al enemigo sin combatir.\n— Sun Tzu"
 LOADING_TIP_47: "Vencerá quien sepa cuándo luchar y cuándo no luchar.\n— Sun Tzu"
 LOADING_TIP_48: "Toda guerra se basa en el engaño.\n— Sun Tzu"
 LOADING_TIP_49: "Aparece débil cuando eres fuerte, y fuerte cuando eres débil.\n— Sun Tzu"
 LOADING_TIP_50: "Los guerreros victoriosos ganan primero y luego van a la guerra; los guerreros derrotados van a la guerra primero y luego buscan ganar.\n— Sun Tzu"
 LOADING_TIP_51: "La velocidad es la esencia de la guerra. Aprovecha la falta de preparación del enemigo.\n— Sun Tzu"
 LOADING_TIP_52: "Conoce a tu enemigo y conócete a ti mismo; en cien batallas, nunca serás derrotado.\n— Sun Tzu"
 LOADING_TIP_53: "La mayor victoria es aquella que no requiere batalla.\n— Sun Tzu"
 LOADING_TIP_54: "No existe ningún caso en que una nación se haya beneficiado de una guerra prolongada.\n— Sun Tzu"
 LOADING_TIP_55: "El general que pierde una batalla hace muy pocos cálculos de antemano.\n— Sun Tzu"
 LOADING_TIP_56: "Protegernos de la derrota depende de nosotros; la oportunidad de derrotar al enemigo la proporciona el propio enemigo.\n— Sun Tzu"
 LOADING_TIP_57: "Somos lo que hacemos repetidamente. La excelencia, entonces, no es un acto, sino un hábito.\n— Aristóteles"
 LOADING_TIP_58: "El único estado estable es aquel en el que todos los hombres son iguales ante la ley.\n— Aristóteles"
 LOADING_TIP_59: "No es una vez ni dos, sino innumerables veces que las mismas ideas aparecen en el mundo.\n— Aristóteles"
 LOADING_TIP_60: "La sociedad política existe para el bien de las acciones nobles, no de la mera convivencia.\n— Aristóteles"
 LOADING_TIP_61: "Un amigo de todos no es amigo de nadie.\n— Aristóteles"
 LOADING_TIP_62: "La esperanza es un sueño de vigilia.\n— Aristóteles"
 LOADING_TIP_63: "Las raíces de la educación son amargas, pero su fruto es dulce.\n— Aristóteles"
 LOADING_TIP_64: "Conocerse a uno mismo es el comienzo de toda sabiduría.\n— Aristóteles"
 LOADING_TIP_65: "Solo los muertos han visto el fin de la guerra.\n— Platón, atribuido"
 LOADING_TIP_66: "Una buena decisión se basa en el conocimiento, no en los números.\n— Platón"
 LOADING_TIP_67: "La medida de un hombre es lo que hace con el poder.\n— Platón"
 LOADING_TIP_68: "Nada en los asuntos humanos merece excesiva preocupación.\n— Platón"
 LOADING_TIP_69: "Dame una palanca suficientemente larga y un punto de apoyo, y moveré el mundo.\n— Arquímedes"
 LOADING_TIP_70: "Dame un lugar donde apoyarme y moveré la Tierra.\n— Arquímedes"
 LOADING_TIP_71: "Hay poco riesgo de que un general sea despreciado por sus hombres si, en todo lo que predica, demuestra ser el más capaz de practicarlo.\n— Jenofonte"
 LOADING_TIP_72: "Ningún hombre puede ser un buen oficial si no soporta más que los que manda.\n— Jenofonte"
 LOADING_TIP_73: "El exceso de duelo por los muertos es locura; es un daño para los vivos, y los muertos no lo saben.\n— Jenofonte"
 LOADING_TIP_74: "Nunca estoy menos ocioso que cuando estoy ocioso, ni menos solo que cuando estoy solo.\n— Escipión Africano"
 LOADING_TIP_75: "La ingratitud hacia los grandes hombres es algo que un estado jamás debería practicar.\n— Escipión Africano, atribuido"
 LOADING_TIP_76: "La dilación es el remedio de la ira.\n— Fabio Máximo, atribuido"
 LOADING_TIP_77: "Vuelve con tu escudo, o sobre él.\n— Dicho espartano"
 LOADING_TIP_78: "Molon labe. (Ven y tómalas.)\n— Leónidas de Esparta"
 LOADING_TIP_79: "Los muros de Esparta son sus jóvenes: los muros más fuertes de todos.\n— Licurgo de Esparta, atribuido"
 LOADING_TIP_80: "Nada es tan fácil como el autoengaño. Pues lo que cada hombre desea, eso cree que es verdad.\n— Demóstenes"
 LOADING_TIP_81: "Las pequeñas oportunidades son a menudo el comienzo de grandes empresas.\n— Demóstenes"
 LOADING_TIP_82: "La mente no es un recipiente a llenar, sino un fuego a encender.\n— Plutarco"
 LOADING_TIP_83: "No cometer errores no está en el poder del hombre; pero de sus errores y equivocaciones los sabios y buenos aprenden sabiduría.\n— Plutarco"
 LOADING_TIP_84: "Quien huye hoy, puede luchar mañana.\n— Menandro, atribuido"
 LOADING_TIP_85: "El hombre conquista el mundo conquistándose a sí mismo.\n— Zenón de Citio"
 LOADING_TIP_86: "No llames feliz a ningún hombre antes de que muera.\n— Solón"
 LOADING_TIP_87: "Antes de comenzar, planifica con cuidado.\n— Cicerón"
 LOADING_TIP_88: "Los nervios de la guerra son el dinero sin límite.\n— Cicerón"
 LOADING_TIP_89: "Las leyes callan en tiempo de guerra.\n— Cicerón (Inter arma enim silent leges)"
 LOADING_TIP_90: "Ignorar lo que ocurrió antes de nacer es permanecer siempre niño.\n— Cicerón"
 LOADING_TIP_91: "Un burro cargado de oro puede tomar cualquier fortaleza.\n— Filipo II de Macedonia, atribuido"
 LOADING_TIP_92: "La suerte es lo que sucede cuando la preparación se encuentra con la oportunidad.\n— Séneca"
 LOADING_TIP_93: "Sufrimos más a menudo en la imaginación que en la realidad.\n— Séneca"
 LOADING_TIP_94: "Divide y vencerás.\n— Máxima política romana"
 LOADING_TIP_95: "Un ejército marcha sobre su estómago.\n— Sabiduría militar antigua"
 LOADING_TIP_96: "El enemigo de mi enemigo es mi amigo.\n— Proverbio antiguo"
 LOADING_TIP_97: "Un barco en el puerto está seguro, pero eso no es para lo que sirven los barcos.\n— Sabiduría marinera antigua"
 LOADING_TIP_98: "Quien sea excelente en emplear fuerzas podrá usar tanto a los talentosos como a los no talentosos.\n— Sun Tzu"
 LOADING_TIP_99: "Senatus Populusque Romanus. El Senado y el Pueblo de Roma.\n— Tradición romana"
